spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

APP_CONFIG_ENCRYPTION_KEY: "test-encryption-key-for-unit-tests"

app:
  jwt:
    secret: test-secret-key-for-testing-only-at-least-32-chars-long
    expiration-minutes: 60
    refresh-expiration-days: 7
